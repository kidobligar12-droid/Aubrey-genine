<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery with Pictures and Videos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }
    .gallery-item {
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .gallery-item img,
    .gallery-item video {
      width: 100%;
      display: block;
    }
    .caption {
      padding: 10px;
      text-align: center;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>
<body>

  <h1>My Gallery</h1>
  <div class="gallery">
    <!-- Picture -->
    <div class="gallery-item">
      <img src="https://via.placeholder.com/400x250" alt="Sample Picture">
      <div class="caption">Beautiful Landscape</div>
    </div>

    <!-- Video -->
    <div class="gallery-item">
      <video controls>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
      <div class="caption">
